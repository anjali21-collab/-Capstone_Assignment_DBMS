<!DOCTYPE html>
<html>
<head>
<title>Booking History</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
}

h2{
  text-align:center;
  padding:20px;
}

table{
  width:90%;
  margin:auto;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  border-bottom:1px solid #333;
  text-align:center;
}

th{
  background:#1e293b;
}

tr:hover{
  background:#1e293b;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin:2px;
}

.return{
  background:#22c55e;
  color:white;
}

.cancel{
  background:red;
  color:white;
}
</style>

</head>

<body>

<h2>📜 Booking History</h2>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Car</th>
  <th>Start</th>
  <th>End</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

<script>

function loadData(){
  fetch("http://localhost:3000/bookings")
  .then(res => res.json())
  .then(data => {

    let table = document.getElementById("data");
    table.innerHTML = "";

    data.forEach(b => {
      table.innerHTML += `
      <tr>
        <td>${b.booking_id}</td>
        <td>${b.name}</td>
        <td>${b.model}</td>
        <td>${b.start_date}</td>
        <td>${b.end_date}</td>
        <td>${b.status}</td>
        <td>
          ${
            b.status === 'Booked'
            ? `
              <button class="return" onclick="returnCar(${b.booking_id})">Return</button>
              <button class="cancel" onclick="cancelBooking(${b.booking_id})">Cancel</button>
              `
            : b.status === 'Returned'
            ? '✔ Returned'
            : '❌ Cancelled'
          }
        </td>
      </tr>
      `;
    });

  });
}

// 🔄 RETURN
function returnCar(id){
  fetch("http://localhost:3000/return", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ booking_id: id })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    loadData();
  });
}

// ❌ CANCEL
function cancelBooking(id){
  if(confirm("Cancel this booking?")){
    fetch("http://localhost:3000/cancel", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ booking_id: id })
    })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      loadData();
    });
  }
}

// initial load
loadData();

</script>

</body>
</html>
